services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c 'redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
      --requirepass "${REDIS_PASSWORD:-change-me-in-production}"'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-change-me-in-production}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "5050:8000"
    environment:
      - CONFIG_PATH=/config/config.json
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change-me-in-production}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-change-me-in-production}@redis:6379/0
      - DB_PATH=/data/soc.db
      - DATUM_ADMIN_USER=${DATUM_ADMIN_USER:-}
      - DATUM_ADMIN_PASS=${DATUM_ADMIN_PASS:-}
    volumes:
      - ./config.json:/config/config.json
      - soc-data:/data
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "rwbq5qjtjlvuje4d5jrqddzntadcmjnzqkr2bwmmjjnmrey73bjr2iqd.local:192.168.1.15"
      - "ujhd7ivjwisu7c4thp4ksod2eqjjlxoebpiblovfyfy75qltk247i6id.local:192.168.1.15"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python3", "/app/backend/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    network_mode: "host"
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  soc-data:
    driver: local
